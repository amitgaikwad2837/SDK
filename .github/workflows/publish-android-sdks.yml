name: Publish Android SDKs to Maven Central

on:
  push:
    branches: [main]
    paths:
      - 'projects/android-**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0)'
        required: false

permissions:
  contents: read

jobs:
  publish-android-sdks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk:
          - android-ai-provider-core
          - android-emergency-sos-sdk
          - android-fall-detection-sdk
          - android-distress-detection-sdk
          - android-voice-assistant-sdk
          - android-ocr-explain-sdk
          - android-accessibility-assistant-sdk
          - android-vision-assistance-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.${{ github.run_number }}-SNAPSHOT" >> $GITHUB_OUTPUT
          fi

      - name: Build with Gradle
        working-directory: projects/${{ matrix.sdk }}
        run: chmod +x gradlew && ./gradlew build -Pversion=${{ steps.version.outputs.version }}

      - name: Run tests
        working-directory: projects/${{ matrix.sdk }}
        run: ./gradlew test

      - name: Publish to Maven Central
        working-directory: projects/${{ matrix.sdk }}
        run: ./gradlew publish -Pversion=${{ steps.version.outputs.version }}
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Publish notification
        run: |
          echo "Published ${{ matrix.sdk }}:${{ steps.version.outputs.version }} to Maven Central"
          echo "https://central.sonatype.com/artifact/io.github.amitgaikwad2837/${{ matrix.sdk }}"
