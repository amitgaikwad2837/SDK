name: Publish Android SDKs to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0)'
        required: true
  push:
    branches: [main]
    paths:
      - 'projects/android-**'

permissions:
  contents: read

jobs:
  publish-android-sdks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - android-ai-provider-core
          - android-emergency-sos-sdk
          - android-fall-detection-sdk
          - android-distress-detection-sdk
          - android-voice-assistant-sdk
          - android-ocr-explain-sdk
          - android-accessibility-assistant-sdk
          - android-vision-assistance-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -z "${{ github.event.inputs.version }}" ]; then
              echo "::error::workflow_dispatch requires a non-SNAPSHOT version input (for example: 1.0.0)."
              exit 1
            fi
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.${{ github.run_number }}-SNAPSHOT" >> $GITHUB_OUTPUT
          fi

      - name: Validate publish credentials
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: |
          missing=0
          for var in CENTRAL_PORTAL_USERNAME CENTRAL_PORTAL_PASSWORD SIGNING_KEY SIGNING_KEY_ID SIGNING_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Build with Gradle
        run: gradle :${{ matrix.sdk }}:build -Pversion=${{ steps.version.outputs.version }}

      - name: Run tests
        run: gradle :${{ matrix.sdk }}:test -Pversion=${{ steps.version.outputs.version }}

      - name: Publish to Maven Central
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: gradle :${{ matrix.sdk }}:publish -Pversion=${{ steps.version.outputs.version }}
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Release from staging
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: |
          # Give staging repository a moment to be indexed
          sleep 10
          
          # Release all deployments for this namespace using Basic auth
          CREDENTIALS=$(echo -n "${{ secrets.CENTRAL_PORTAL_USERNAME }}:${{ secrets.CENTRAL_PORTAL_PASSWORD }}" | base64)
          
          curl -X POST \
            -H "Authorization: Basic $CREDENTIALS" \
            -H "Content-Type: application/json" \
            "https://central.sonatype.com/api/v1/publisher/deployment/publish" \
            -d '{"deploymentName":"io.github.amitgaikwad2837"}' \
            -w "\nHTTP Status: %{http_code}\n"
          
          echo "Release triggered for staged artifacts"

      - name: Publish notification
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: |
          echo "Published ${{ matrix.sdk }}:${{ steps.version.outputs.version }} to Maven Central"
          echo "Artifacts will be visible in ~10 minutes"
          echo "https://central.sonatype.com/artifact/io.github.amitgaikwad2837/${{ matrix.sdk }}"

      - name: Snapshot publish skipped
        if: ${{ endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: |
          echo "Skipping Maven Central publish for snapshot version ${{ steps.version.outputs.version }}"
