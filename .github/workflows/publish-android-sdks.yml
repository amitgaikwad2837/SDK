name: Publish Android SDKs to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0)'
        required: true
  push:
    branches: [main]
    paths:
      - 'projects/android-**'

permissions:
  contents: read

jobs:
  publish-android-sdks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - android-ai-provider-core
          - android-emergency-sos-sdk
          - android-fall-detection-sdk
          - android-distress-detection-sdk
          - android-voice-assistant-sdk
          - android-ocr-explain-sdk
          - android-accessibility-assistant-sdk
          - android-vision-assistance-sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -z "${{ github.event.inputs.version }}" ]; then
              echo "::error::workflow_dispatch requires a non-SNAPSHOT version input (for example: 1.0.0)."
              exit 1
            fi
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.${{ github.run_number }}-SNAPSHOT" >> $GITHUB_OUTPUT
          fi

      - name: Validate publish credentials
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: |
          missing=0
          for var in CENTRAL_PORTAL_USERNAME CENTRAL_PORTAL_PASSWORD SIGNING_KEY SIGNING_KEY_ID SIGNING_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Build with Gradle
        run: gradle :${{ matrix.sdk }}:build -Pversion=${{ steps.version.outputs.version }}

      - name: Run tests
        run: gradle :${{ matrix.sdk }}:test -Pversion=${{ steps.version.outputs.version }}

      - name: Publish to Maven Central
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: gradle :${{ matrix.sdk }}:publish -Pversion=${{ steps.version.outputs.version }}
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Publish notification
        if: ${{ !endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: |
          echo "Uploaded ${{ matrix.sdk }}:${{ steps.version.outputs.version }} to Sonatype staging"
          echo "If not visible in Maven Central yet, release may still be processing in Sonatype"
          echo "https://central.sonatype.com/artifact/io.github.amitgaikwad2837/${{ matrix.sdk }}"

      - name: Snapshot publish skipped
        if: ${{ endsWith(steps.version.outputs.version, '-SNAPSHOT') }}
        run: |
          echo "Skipping Maven Central publish for snapshot version ${{ steps.version.outputs.version }}"

  promote-and-verify:
    needs: publish-android-sdks
    if: ${{ needs.publish-android-sdks.result == 'success' && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest

    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Upload OSSRH staging repositories to Portal
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          AUTH=$(printf "%s:%s" "$CENTRAL_PORTAL_USERNAME" "$CENTRAL_PORTAL_PASSWORD" | base64 | tr -d '\n')
          API_BASE="https://ossrh-staging-api.central.sonatype.com"
          NAMESPACE="io.github.amitgaikwad2837"

          echo "Looking for OSSRH staging repositories for namespace $NAMESPACE"
          repo_keys=""

          for attempt in $(seq 1 20); do
            echo "Attempt $attempt/20: querying manual search API"
            json=$(curl -fsS \
              -H "Authorization: Bearer $AUTH" \
              "$API_BASE/manual/search/repositories?ip=any&profile_id=$NAMESPACE")

            repo_keys=$(echo "$json" | jq -r '.repositories[]? | select(.state == "open" or .state == "closed") | .key' | sort -u)

            if [ -n "$repo_keys" ]; then
              break
            fi

            sleep 15
          done

          if [ -z "$repo_keys" ]; then
            echo "::error::No open/closed staging repositories were found for namespace $NAMESPACE."
            echo "::error::Manual upload to Central Portal cannot proceed."
            exit 1
          fi

          echo "Uploading repositories to Central Portal with automatic publishing:"
          echo "$repo_keys"

          while IFS= read -r repo_key; do
            [ -z "$repo_key" ] && continue
            echo "Uploading repository $repo_key"
            http_code=$(curl -sS -o /tmp/manual-upload-response.txt -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $AUTH" \
              "$API_BASE/manual/upload/repository/$repo_key?publishing_type=automatic")

            if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
              echo "::error::Failed to upload repository $repo_key to Portal (HTTP $http_code)."
              cat /tmp/manual-upload-response.txt || true
              exit 1
            fi
          done <<< "$repo_keys"

      - name: Verify visibility in Maven Central
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          GROUP_ID="io.github.amitgaikwad2837"

          echo "Waiting for Maven Central indexing of $GROUP_ID:$VERSION"
          for attempt in $(seq 1 60); do
            response=$(curl -fsS "https://search.maven.org/solrsearch/select?q=g:%22$GROUP_ID%22+AND+v:%22$VERSION%22&rows=20&wt=json")
            found=$(echo "$response" | jq -r '.response.numFound // 0')
            echo "Attempt $attempt/60: numFound=$found"

            if [ "$found" -gt 0 ]; then
              echo "Maven Central now lists $GROUP_ID version $VERSION"
              exit 0
            fi

            sleep 20
          done

          echo "::error::Version $VERSION not visible in Maven Central within timeout window."
          exit 1
