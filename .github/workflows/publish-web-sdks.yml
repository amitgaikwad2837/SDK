name: Publish Web SDKs to npm

on:
  push:
    branches: [main]
    paths:
      - 'projects/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0)'
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish-web-sdks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk:
          - api-contract-drift-detector
          - ai-powered-migration-generator
          - api-mock-data-intelligence
          - architecture-decision-record-generator
          - database-query-explainer
          - enterprise-readiness-scanner
          - frontend-ux-linter
          - openapi-full-stack-generator
          - production-incident-copilot
          - prompt-testing-framework
          - pull-request-reviewer-agent
          - readme-intelligence-sdk
          - saas-boilerplate-analyzer
          - screen-intelligence-sdk
          - ai-sdk-internal-tools

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org/'

      - name: Determine version and dist-tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "dist_tag=latest" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "dist_tag=latest" >> $GITHUB_OUTPUT
          else
            BASE=$(node -p "require('./projects/${{ matrix.sdk }}/package.json').version" 2>/dev/null || echo "0.0.0")
            echo "version=${BASE}-beta.${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "dist_tag=next" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        working-directory: projects/${{ matrix.sdk }}
        run: npm ci

      - name: Run tests
        working-directory: projects/${{ matrix.sdk }}
        run: npm test

      - name: Build
        working-directory: projects/${{ matrix.sdk }}
        run: npm run build

      - name: Set version
        working-directory: projects/${{ matrix.sdk }}
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Publish to npm
        working-directory: projects/${{ matrix.sdk }}
        run: npm publish --tag ${{ steps.version.outputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish notification
        run: |
          echo "Published ${{ matrix.sdk }}@${{ steps.version.outputs.version }} to npm (tag: ${{ steps.version.outputs.dist_tag }})"
          echo "https://www.npmjs.com/package/${{ matrix.sdk }}"
